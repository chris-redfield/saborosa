<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saborosa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- Studio logo shown behind the canvas during initial asset load.
             In-body <img> so it paints before any script runs; the opaque
             canvas covers it once the game renders its first frame. -->
        <img id="boot-logo" src="assets/saborosa-logo-V3-low.png" alt="Saborosa">
        <canvas id="game-canvas"></canvas>
        <div id="fps-counter">FPS: 0</div>
        <div id="debug-info"></div>
    </div>

    <!-- Engine -->
    <script src="src/engine/perf.js"></script>

    <script src="src/engine/input.js"></script>

    <script src="src/engine/audio.js"></script>

    <script src="src/engine/scale.config.js"></script>
    <script src="src/engine/game.js"></script>

    <!-- Entities -->
    <script src="src/entities/spritesheet.js"></script>
    <script src="src/entities/environment.js"></script>
    <script src="src/entities/mapobject.js"></script>
    <script src="src/entities/overlayobject.js"></script>
    <script src="src/entities/letter.js"></script>
    <script src="src/entities/fxobject.config.js"></script>
    <script src="src/entities/fxobject.js"></script>
    <script src="src/entities/liverock.js"></script>
    <script src="src/entities/lava.js"></script>
    <script src="src/entities/sand.js"></script>
    <script src="src/entities/portal.js"></script>
    <script src="src/entities/player.js"></script>
    <script src="src/entities/enemy.js"></script>
    <script src="src/entities/rockenemy.js"></script>
    <script src="src/entities/bushenemy.js"></script>
    <script src="src/entities/phoneenemy.js"></script>
    <script src="src/entities/boom.js"></script>

    <!-- World -->
    <script src="src/world/world.js"></script>
    <script src="src/world/stages.js"></script>

    <!-- Screens -->
    <script src="src/screens/intro.config.js"></script>
    <script src="src/screens/intro.js"></script>
    <script src="src/screens/select.js"></script>
    <script src="src/screens/dungeon.js"></script>
    <script src="src/screens/tiledungeon.js"></script>

    <!-- Main -->
    <script src="src/main.js"></script>
</body>
</html>
