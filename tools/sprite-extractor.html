<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saborosa - Sprite Auto-Extractor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        h1 { color: #e94560; font-size: 20px; margin-bottom: 4px; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 16px; }

        .controls {
            background: #16213e;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 12px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #ccc; }
        label .hint { color: #666; font-size: 11px; margin-left: 4px; }

        input[type=number] {
            background: #0d1b2a;
            color: #eee;
            border: 1px solid #0f3460;
            padding: 4px 6px;
            width: 70px;
            border-radius: 3px;
        }

        input[type=file] { color: #aaa; font-size: 12px; }

        button {
            background: #0f3460;
            color: #eee;
            border: 1px solid #53d8fb;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        button:hover { background: #1a4a8a; }
        button.primary { background: #2d6a4f; border-color: #52b788; }
        button.primary:hover { background: #3a8a63; }

        #status { color: #aaa; font-size: 13px; margin-bottom: 12px; min-height: 18px; }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            align-items: start;
        }

        .panel { background: #16213e; padding: 12px; border-radius: 4px; }
        .panel h2 { font-size: 14px; color: #53d8fb; margin-bottom: 8px; }

        #source-wrap {
            background: #fff;
            display: block;
            max-height: 80vh;
            overflow: auto;
            padding: 4px;
            border-radius: 3px;
        }
        #source-canvas { display: block; image-rendering: pixelated; }

        #results {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .sprite-thumb {
            background: #fff;
            padding: 4px;
            border: 1px solid #333;
            border-radius: 3px;
        }
        .sprite-thumb canvas { display: block; image-rendering: pixelated; }
        .sprite-thumb .meta {
            color: #555;
            font-size: 10px;
            text-align: center;
            padding-top: 2px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Sprite Auto-Extractor</h1>
    <div class="subtitle">
        Slices a spritesheet by detecting whitespace gaps between sprites. Tune background tolerance and minimum gap if detection misses parts or merges neighbors.
    </div>

    <div class="controls">
        <label>Image:
            <input type="file" id="file-input" accept="image/*">
        </label>
        <label>Bg tolerance:
            <input type="number" id="bg-tol" value="30" min="0" max="100">
            <span class="hint">higher = more pixels treated as background</span>
        </label>
        <label>Min gap (px):
            <input type="number" id="min-gap" value="4" min="1" max="50">
            <span class="hint">whitespace required to split sprites</span>
        </label>
        <label>Padding (px):
            <input type="number" id="padding" value="2" min="0" max="20">
        </label>
        <label title="When detection forms a clean grid, force every frame in the same column to share max(w) and max(h), anchored at bottom-center.">
            <input type="checkbox" id="normalize-cols" checked>
            Normalize column sizes
        </label>
        <button id="detect-btn" class="primary">Detect Sprites</button>
        <button id="export-btn">Export JSON</button>
    </div>

    <div id="status">Loading default image…</div>

    <div class="grid-2col">
        <div class="panel">
            <h2>Source (detection overlay)</h2>
            <div id="source-wrap">
                <canvas id="source-canvas" width="100" height="100"></canvas>
            </div>
        </div>
        <div class="panel">
            <h2>Extracted sprites</h2>
            <div id="results"></div>
        </div>
    </div>

    <script>
        let img = null;
        let detected = [];

        const canvas = document.getElementById('source-canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        const detectBtn = document.getElementById('detect-btn');
        const exportBtn = document.getElementById('export-btn');
        const resultsDiv = document.getElementById('results');
        const statusEl = document.getElementById('status');

        const DEFAULT_IMAGE = '../assets/saborosa-chat-002-2.jpeg';

        // --- Image loading ---

        function loadImage(src, label) {
            img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                statusEl.textContent = `Loaded ${label || src} — ${img.width}×${img.height}px. Click "Detect Sprites".`;
                detected = [];
                resultsDiv.innerHTML = '';
            };
            img.onerror = () => {
                statusEl.textContent = `Failed to load ${label || src}.`;
            };
            img.src = src;
        }

        fileInput.addEventListener('change', (e) => {
            const f = e.target.files[0];
            if (!f) return;
            loadImage(URL.createObjectURL(f), f.name);
        });

        loadImage(DEFAULT_IMAGE, DEFAULT_IMAGE);

        // --- Detection algorithm ---

        /**
         * Find maximal runs of nonzero values, then merge runs separated by
         * gaps smaller than minGap.
         */
        function findBands(counts, minGap) {
            const runs = [];
            let s = -1;
            for (let i = 0; i < counts.length; i++) {
                if (counts[i] > 0) {
                    if (s < 0) s = i;
                } else if (s >= 0) {
                    runs.push({ start: s, end: i - 1 });
                    s = -1;
                }
            }
            if (s >= 0) runs.push({ start: s, end: counts.length - 1 });

            if (runs.length === 0) return [];
            const merged = [runs[0]];
            for (let i = 1; i < runs.length; i++) {
                const prev = merged[merged.length - 1];
                const gap = runs[i].start - prev.end - 1;
                if (gap < minGap) prev.end = runs[i].end;
                else merged.push(runs[i]);
            }
            return merged;
        }

        function detect(bgTol, minGap, pad, normalize) {
            const W = img.width;
            const H = img.height;
            ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, W, H).data;

            // Foreground = pixel meaningfully darker than pure white on any channel,
            // OR transparent-bg sprite with alpha > 0.
            const threshold = 255 - bgTol;
            const isFg = new Uint8Array(W * H);
            for (let i = 0; i < W * H; i++) {
                const r = data[i * 4];
                const g = data[i * 4 + 1];
                const b = data[i * 4 + 2];
                const a = data[i * 4 + 3];
                if (a < 128) { isFg[i] = 0; continue; }
                isFg[i] = (r < threshold || g < threshold || b < threshold) ? 1 : 0;
            }

            // Row projection
            const rowCount = new Int32Array(H);
            for (let y = 0; y < H; y++) {
                let rc = 0;
                const row = y * W;
                for (let x = 0; x < W; x++) if (isFg[row + x]) rc++;
                rowCount[y] = rc;
            }
            const rowBands = findBands(rowCount, minGap);

            // For each row band, project columns within that band only.
            // Track per-row counts so we can spot a clean grid.
            detected = [];
            const perRowCounts = [];
            for (const rb of rowBands) {
                const before = detected.length;
                const colCount = new Int32Array(W);
                for (let y = rb.start; y <= rb.end; y++) {
                    const row = y * W;
                    for (let x = 0; x < W; x++) if (isFg[row + x]) colCount[x]++;
                }
                const colBands = findBands(colCount, minGap);
                for (const cb of colBands) {
                    // Tight bbox of foreground pixels inside this cell
                    let minX = W, minY = H, maxX = -1, maxY = -1;
                    for (let y = rb.start; y <= rb.end; y++) {
                        const row = y * W;
                        for (let x = cb.start; x <= cb.end; x++) {
                            if (isFg[row + x]) {
                                if (x < minX) minX = x;
                                if (x > maxX) maxX = x;
                                if (y < minY) minY = y;
                                if (y > maxY) maxY = y;
                            }
                        }
                    }
                    if (maxX < 0) continue;
                    minX = Math.max(0, minX - pad);
                    minY = Math.max(0, minY - pad);
                    maxX = Math.min(W - 1, maxX + pad);
                    maxY = Math.min(H - 1, maxY + pad);
                    detected.push({ x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 });
                }
                perRowCounts.push(detected.length - before);
            }

            // Per-column size normalization (only if a clean rectangular grid).
            // For each column, every frame gets max(w) and max(h), anchored at
            // bottom-center so the feet line stays put across animation frames.
            let normalizeNote = '';
            if (normalize && perRowCounts.length > 0) {
                const ncols = perRowCounts[0];
                const isClean = perRowCounts.every(c => c === ncols);
                if (isClean && ncols > 0) {
                    const nrows = perRowCounts.length;
                    const colMaxW = new Array(ncols).fill(0);
                    const colMaxH = new Array(ncols).fill(0);
                    for (let i = 0; i < detected.length; i++) {
                        const c = i % ncols;
                        if (detected[i].w > colMaxW[c]) colMaxW[c] = detected[i].w;
                        if (detected[i].h > colMaxH[c]) colMaxH[c] = detected[i].h;
                    }
                    for (let i = 0; i < detected.length; i++) {
                        const c = i % ncols;
                        const f = detected[i];
                        const centerX = f.x + f.w / 2;
                        const bottomY = f.y + f.h;
                        const newW = colMaxW[c];
                        const newH = colMaxH[c];
                        let newX = Math.round(centerX - newW / 2);
                        let newY = bottomY - newH;
                        newX = Math.max(0, Math.min(newX, W - newW));
                        newY = Math.max(0, Math.min(newY, H - newH));
                        f.x = newX; f.y = newY; f.w = newW; f.h = newH;
                    }
                    normalizeNote = ` — normalized ${nrows}×${ncols} grid (per-column ${colMaxW.map((w, i) => w + '×' + colMaxH[i]).join(', ')})`;
                } else {
                    normalizeNote = ` — uneven rows (${perRowCounts.join(', ')}), normalization skipped`;
                }
            }

            drawOverlay();
            renderResults();
            statusEl.textContent = `Detected ${detected.length} sprite(s) in ${rowBands.length} row(s)${normalizeNote}.`;
        }

        // --- Rendering ---

        function drawOverlay() {
            ctx.drawImage(img, 0, 0);
            ctx.lineWidth = 2;
            ctx.font = 'bold 16px monospace';
            detected.forEach((f, i) => {
                ctx.strokeStyle = '#e94560';
                ctx.strokeRect(f.x - 0.5, f.y - 0.5, f.w + 1, f.h + 1);
                ctx.fillStyle = 'rgba(233, 69, 96, 0.85)';
                ctx.fillRect(f.x, f.y, 26, 18);
                ctx.fillStyle = '#fff';
                ctx.fillText(i, f.x + 4, f.y + 14);
            });
        }

        function renderResults() {
            resultsDiv.innerHTML = '';
            detected.forEach((f, i) => {
                const wrap = document.createElement('div');
                wrap.className = 'sprite-thumb';
                const size = 80;
                const c = document.createElement('canvas');
                c.width = size; c.height = size;
                const cx = c.getContext('2d');
                cx.imageSmoothingEnabled = false;
                const scale = Math.min(size / f.w, size / f.h);
                const dw = f.w * scale, dh = f.h * scale;
                cx.drawImage(img, f.x, f.y, f.w, f.h, (size - dw) / 2, (size - dh) / 2, dw, dh);
                wrap.appendChild(c);
                const meta = document.createElement('div');
                meta.className = 'meta';
                meta.textContent = `[${i}] ${f.w}×${f.h}`;
                wrap.appendChild(meta);
                resultsDiv.appendChild(wrap);
            });
        }

        // --- Controls ---

        detectBtn.addEventListener('click', () => {
            if (!img) return;
            const bgTol = parseInt(document.getElementById('bg-tol').value, 10);
            const minGap = parseInt(document.getElementById('min-gap').value, 10);
            const pad = parseInt(document.getElementById('padding').value, 10);
            const normalize = document.getElementById('normalize-cols').checked;
            detect(bgTol, minGap, pad, normalize);
        });

        exportBtn.addEventListener('click', () => {
            if (detected.length === 0) {
                alert('Run "Detect Sprites" first.');
                return;
            }
            const data = JSON.stringify({ frames: detected }, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'sprite-frames.json';
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
