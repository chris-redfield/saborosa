<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saborosa — Map Editor</title>
<style>
  :root { --bg:#1a1a2e; --panel:#16213e; --accent:#53d8fb; --hot:#e94560; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:#e6e6e6;
              font:13px/1.4 monospace; overflow:hidden; }
  #top { display:flex; align-items:center; gap:10px; padding:8px 12px;
         background:var(--panel); border-bottom:1px solid #0c1226; }
  #top b { color:var(--accent); }
  .tab { padding:5px 12px; border:1px solid #3a4a6a; border-radius:4px;
         background:#22304f; color:#cfe; cursor:pointer; }
  .tab.on { background:var(--accent); color:#04222b; border-color:var(--accent); }
  button { padding:5px 10px; border:1px solid #3a4a6a; border-radius:4px;
           background:#22304f; color:#cfe; cursor:pointer; }
  button:hover { background:#2c3e63; }
  #main { display:flex; height:calc(100% - 43px); }
  #stage { flex:1; position:relative; overflow:hidden; }
  canvas { display:block; position:absolute; inset:0; }
  #side { width:300px; background:var(--panel); border-left:1px solid #0c1226;
          display:flex; flex-direction:column; }
  #thumbs { flex:1; overflow-y:auto; padding:8px; display:grid;
            grid-template-columns:repeat(3,1fr); gap:6px; align-content:start; }
  .thumb { background:#0e1730; border:2px solid #2a3a5a; border-radius:5px;
           padding:3px; cursor:pointer; text-align:center; }
  .thumb.on { border-color:var(--hot); }
  .thumb canvas { position:static; width:100%; height:64px; object-fit:contain; }
  .thumb span { display:block; font-size:10px; color:#9ab; margin-top:2px;
                white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #inspect { border-top:1px solid #0c1226; padding:10px; min-height:140px; }
  #inspect label { display:block; margin:7px 0 2px; color:#9ab; font-size:11px; }
  #inspect input[type=range] { width:100%; }
  .row { display:flex; gap:8px; align-items:center; }
  .hint { color:#7a8aa8; font-size:11px; }
  #status { margin-left:auto; color:#8fce8f; }
</style>
</head>
<body>
<div id="top">
  <b>MAP EDITOR</b>
  <span class="tab on" id="tabPlace">Place</span>
  <span class="tab" id="tabCol">Collision</span>
  <button id="fit">Fit</button>
  <button id="exportObjs">⬇ placements</button>
  <button id="exportDefs">⬇ 001 defs</button>
  <button id="exportDefs2">⬇ 002 defs</button>
  <span class="hint">Space+drag pan · wheel zoom · Del removes · click thumb = brush</span>
  <span id="status"></span>
</div>
<div id="main">
  <div id="stage"><canvas id="cv"></canvas></div>
  <div id="side">
    <div id="thumbs"></div>
    <div id="inspect"><div class="hint">Select an asset or placement…</div></div>
  </div>
</div>
<script>
const A = '../assets/';
const SHEET = A + 'saborosa-assets-001.png';
const BG = A + 'cor-saborosa-fundo-fim-island-01-combined.png'; // the real game background
const DEFS = A + 'saborosa-assets-001-sprites.json';
const OBJS = A + 'painted-isle-objects.json';
const LIVEROCK_SHEET = A + 'saborosa-cha-001.png';   // liverock animation sheet
// Blocks/props sheet (assets-002): pickable blocks + the placeable tower/stack/
// platform props. Authored by tools/build-block-defs.py. Loaded here too so any
// of them can be hand-placed on the map.
const SHEET2 = A + 'saborosa-assets-002.png';
const DEFS2 = A + 'saborosa-assets-002-sprites.json';
// Must match STAGES[3].backgroundImageRect in src/world/stages.js
const RECT = { x: 1577, y: 0, w: 8366, h: 6480 };
const FIXED_SCALE = 0.3;   // assets-001 assets placed at this scale (halved from 0.6)
// assets-002 are high-res; this matches BLOCK_SCALE in src/entities/environment.js
// so the editor preview equals the in-game size. (A placed `block` ignores its
// scale in-game and always uses BLOCK_SCALE; a `prop` honors this scale.)
const BLOCK_PREVIEW_SCALE = 0.14;

// Special (non-sheet) assets: animated entities the game spawns by id instead
// of as a static MapObject. The living rock uses its own sheet + the pos1_idle
// frame for preview; its real collision/animation come from the game at runtime
// (collision-config.json `liverock`), so `col` here is reference-only.
const SPECIAL = {
  // defaultScale 1 = native size, matching how it appears on the Sand Bank map
  // (same ratio to the player, which is the same size on every map).
  liverock: { x: 574, y: 214, w: 253, h: 169, sheet: 'liverock', defaultScale: 1,
              col: { offX: 0.02, offY: 0.31, w: 0.92, h: 0.52 } }
};
// Resolve an asset def (001 sheet, 002 block/prop sheet, or special) and the
// image it draws from. 002 defs are tagged `sheet:'block'` at load.
function assetDef(id) { return defs.assets[id] || blockDefs.assets[id] || SPECIAL[id]; }
function imgFor(d) {
  if (!d) return sheetImg;
  if (d.sheet === 'liverock') return liverockImg;
  if (d.sheet === 'block') return blockImg;
  return sheetImg;
}

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const stage = document.getElementById('stage');
let sheetImg = null, bgImg = null, liverockImg = null, blockImg = null;
let defs = { sheet: 'saborosa-assets-001.png', assets: {} };
let blockDefs = { sheet: 'saborosa-assets-002.png', assets: {} };  // assets-002 blocks/props
let objects = [];                 // { id, x, y, scale, flipX }
let mode = 'place';               // 'place' | 'col'
let brush = null;                 // active asset id for placing
let selected = -1;                // index into objects
let colAsset = null;              // asset id being edited in collision mode

const view = { zoom: 0.12, panX: 0, panY: 0 };

// ---- coordinate helpers (world <-> screen) ----
const w2s = (wx, wy) => [(wx - view.panX) * view.zoom, (wy - view.panY) * view.zoom];
const s2w = (sx, sy) => [sx / view.zoom + view.panX, sy / view.zoom + view.panY];

function resize() {
  cv.width = stage.clientWidth; cv.height = stage.clientHeight; draw();
}
window.addEventListener('resize', resize);

function fit() {
  const z = Math.min(cv.width / RECT.w, cv.height / RECT.h) * 0.95;
  view.zoom = z;
  view.panX = RECT.x + RECT.w / 2 - cv.width / (2 * z);
  view.panY = RECT.y + RECT.h / 2 - cv.height / (2 * z);
  draw();
}

// ---- loading ----
function loadImg(src) { return new Promise(r => { const i = new Image(); i.onload = () => r(i); i.src = src; }); }
async function boot() {
  [sheetImg, bgImg, liverockImg, blockImg] =
    await Promise.all([loadImg(SHEET), loadImg(BG), loadImg(LIVEROCK_SHEET), loadImg(SHEET2)]);
  try { defs = await (await fetch(DEFS, { cache: 'no-cache' })).json(); } catch (e) {}
  try { blockDefs = await (await fetch(DEFS2, { cache: 'no-cache' })).json(); } catch (e) {}
  // Tag each 002 def so imgFor()/placement know its sheet + preview size.
  // (Both tags are editor-only and stripped on export.)
  for (const d of Object.values(blockDefs.assets || {})) { d.sheet = 'block'; d.defaultScale = BLOCK_PREVIEW_SCALE; }
  try {
    const o = await (await fetch(OBJS, { cache: 'no-cache' })).json();
    if (o && o.objects) objects = o.objects;
  } catch (e) {}
  buildThumbs();
  resize(); fit();
  const n = Object.keys(defs.assets).length + Object.keys(blockDefs.assets).length;
  status(`${n} assets · ${objects.length} placed`);
}
function status(t) { document.getElementById('status').textContent = t; }

// ---- thumbnails ----
function buildThumbs() {
  const host = document.getElementById('thumbs'); host.innerHTML = '';
  for (const [id, d] of Object.entries({ ...defs.assets, ...blockDefs.assets, ...SPECIAL })) {
    const el = document.createElement('div'); el.className = 'thumb'; el.dataset.id = id;
    const c = document.createElement('canvas'); c.width = 80; c.height = 64;
    const cc = c.getContext('2d');
    const s = Math.min(c.width / d.w, c.height / d.h);
    const dw = d.w * s, dh = d.h * s;
    cc.drawImage(imgFor(d), d.x, d.y, d.w, d.h, (c.width - dw) / 2, (c.height - dh) / 2, dw, dh);
    const sp = document.createElement('span'); sp.textContent = id;
    el.appendChild(c); el.appendChild(sp);
    el.onclick = () => {
      if (mode === 'place') { brush = id; selected = -1; }
      else { colAsset = id; }
      refreshThumbSel(); inspect(); draw();
    };
    host.appendChild(el);
  }
}
function refreshThumbSel() {
  const cur = mode === 'place' ? brush : colAsset;
  document.querySelectorAll('.thumb').forEach(t => t.classList.toggle('on', t.dataset.id === cur));
}

// ---- drawing ----
function draw() {
  ctx.fillStyle = '#0c1020'; ctx.fillRect(0, 0, cv.width, cv.height);
  // background map at its world rect
  const [bx, by] = w2s(RECT.x, RECT.y);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(bgImg, bx, by, RECT.w * view.zoom, RECT.h * view.zoom);

  if (mode === 'col') { drawColMode(); return; }

  // placements, depth-sorted by bottom edge (matches game)
  const order = objects.map((o, i) => i).sort((a, b) => bottom(objects[a]) - bottom(objects[b]));
  for (const i of order) drawObject(objects[i], i === selected);
}
function bottom(o) { const d = assetDef(o.id); return o.y + d.h * (o.scale || 1); }

function drawObject(o, sel) {
  const d = assetDef(o.id); if (!d) return;
  const sc = o.scale || 1, w = d.w * sc, h = d.h * sc;
  const [sx, sy] = w2s(o.x, o.y);
  const zw = w * view.zoom, zh = h * view.zoom;
  ctx.save();
  if (o.flipX) { ctx.translate(sx + zw, sy); ctx.scale(-1, 1); ctx.drawImage(imgFor(d), d.x, d.y, d.w, d.h, 0, 0, zw, zh); }
  else ctx.drawImage(imgFor(d), d.x, d.y, d.w, d.h, sx, sy, zw, zh);
  ctx.restore();
  // collision box (red) — mirrored when flipped
  const col = d.col || { offX: .2, offY: .78, w: .6, h: .2 };
  const cw = w * col.w, ch = h * col.h;
  let ox = w * col.offX; if (o.flipX) ox = w - ox - cw;
  const [cx, cy] = w2s(o.x + ox, o.y + h * col.offY);
  ctx.strokeStyle = 'rgba(233,69,96,0.9)'; ctx.lineWidth = sel ? 2 : 1;
  ctx.strokeRect(cx, cy, cw * view.zoom, ch * view.zoom);
  if (sel) { ctx.strokeStyle = '#53d8fb'; ctx.lineWidth = 1.5; ctx.strokeRect(sx, sy, zw, zh); }
}

// Collision-edit mode: show the selected asset large, drag to set the red box.
let colView = null;  // { ax, ay, scale } sprite placement on screen
function drawColMode() {
  if (!colAsset) { ctx.fillStyle = '#8fa'; ctx.fillText('Pick an asset from the sidebar to edit its collision box.', 20, 30); return; }
  const d = assetDef(colAsset);
  const pad = 60, availW = cv.width - pad * 2, availH = cv.height - pad * 2;
  const s = Math.min(availW / d.w, availH / d.h);
  const ax = (cv.width - d.w * s) / 2, ay = (cv.height - d.h * s) / 2;
  colView = { ax, ay, scale: s };
  ctx.drawImage(imgFor(d), d.x, d.y, d.w, d.h, ax, ay, d.w * s, d.h * s);
  ctx.strokeStyle = '#345'; ctx.strokeRect(ax, ay, d.w * s, d.h * s);
  const col = d.col;
  ctx.fillStyle = 'rgba(233,69,96,0.25)'; ctx.strokeStyle = '#e94560';
  const rx = ax + d.w * col.offX * s, ry = ay + d.h * col.offY * s, rw = d.w * col.w * s, rh = d.h * col.h * s;
  ctx.fillRect(rx, ry, rw, rh); ctx.lineWidth = 2; ctx.strokeRect(rx, ry, rw, rh);
  ctx.fillStyle = '#8fa'; ctx.fillText(colAsset + ' — drag to set the red (blocking) box; rest is passable', 20, 30);
}

// ---- inspector ----
function inspect() {
  const el = document.getElementById('inspect');
  if (mode === 'col') {
    if (!colAsset) { el.innerHTML = '<div class="hint">Pick an asset to edit collision.</div>'; return; }
    const c = assetDef(colAsset).col;
    const note = SPECIAL[colAsset] ? '<div class="hint">live entity — real collision lives in collision-config.json; this is reference only</div>' : '';
    el.innerHTML = `<b>${colAsset}</b> collision (normalized)${note}
      ${slider('offX', c.offX)}${slider('offY', c.offY)}${slider('cw', c.w)}${slider('ch', c.h)}`;
    bindCol();
    return;
  }
  if (selected < 0) { el.innerHTML = '<div class="hint">Brush: ' + (brush || 'none') + '. Click map to place.</div>'; return; }
  const o = objects[selected];
  el.innerHTML = `<b>${o.id}</b> #${selected} <span class="hint">scale ${o.scale}</span>
    <div class="row"><label style="margin:0"><input id="flip" type="checkbox" ${o.flipX ? 'checked' : ''}> flip X</label>
    <button id="del" style="margin-left:auto">Delete</button></div>`;
  document.getElementById('flip').onchange = e => { o.flipX = e.target.checked; draw(); };
  document.getElementById('del').onclick = () => { objects.splice(selected, 1); selected = -1; inspect(); draw(); status(objects.length + ' placed'); };
}
function slider(name, v) {
  return `<label>${name} <span id="lbl_${name}">${(+v).toFixed(2)}</span></label>
    <input data-k="${name}" type="range" min="0" max="1" step="0.01" value="${v}">`;
}
function bindCol() {
  document.querySelectorAll('#inspect input[type=range]').forEach(inp => {
    inp.oninput = e => {
      const k = e.target.dataset.k, v = parseFloat(e.target.value), c = assetDef(colAsset).col;
      ({ offX: () => c.offX = v, offY: () => c.offY = v, cw: () => c.w = v, ch: () => c.h = v })[k]();
      document.getElementById('lbl_' + k).textContent = v.toFixed(2);
      draw();
    };
  });
}

// ---- mouse ----
let drag = null;   // { mode:'pan'|'move'|'colbox', ... }
let space = false;
window.addEventListener('keydown', e => { if (e.code === 'Space') space = true;
  if (e.key === 'Delete' && mode === 'place' && selected >= 0) { objects.splice(selected, 1); selected = -1; inspect(); draw(); } });
window.addEventListener('keyup', e => { if (e.code === 'Space') space = false; });

cv.addEventListener('mousedown', e => {
  const mx = e.offsetX, my = e.offsetY;
  if (space) { drag = { mode: 'pan', sx: mx, sy: my, px: view.panX, py: view.panY }; return; }
  if (mode === 'col') {
    if (!colAsset || !colView) return;
    drag = { mode: 'colbox', x0: mx, y0: my };
    return;
  }
  // place mode: hit-test existing instances (topmost first)
  const [wx, wy] = s2w(mx, my);
  const order = objects.map((o, i) => i).sort((a, b) => bottom(objects[b]) - bottom(objects[a]));
  for (const i of order) {
    const o = objects[i], d = assetDef(o.id), sc = o.scale || 1;
    if (wx >= o.x && wx <= o.x + d.w * sc && wy >= o.y && wy <= o.y + d.h * sc) {
      selected = i; brush = null; refreshThumbSel(); inspect();
      drag = { mode: 'move', sx: mx, sy: my, ox: o.x, oy: o.y, moved: false };
      draw(); return;
    }
  }
  // empty space + active brush -> place (anchor bottom-center)
  if (brush) {
    const d = assetDef(brush);
    const sc = d.defaultScale || FIXED_SCALE;
    const o = { id: brush, x: Math.round(wx - d.w * sc / 2), y: Math.round(wy - d.h * sc), scale: sc, flipX: false };
    objects.push(o); selected = objects.length - 1; inspect(); draw();
    status(objects.length + ' placed');
  } else { selected = -1; inspect(); draw(); }
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  const mx = e.offsetX, my = e.offsetY;
  if (drag.mode === 'pan') { view.panX = drag.px - (mx - drag.sx) / view.zoom; view.panY = drag.py - (my - drag.sy) / view.zoom; draw(); }
  else if (drag.mode === 'move') {
    const o = objects[selected];
    o.x = Math.round(drag.ox + (mx - drag.sx) / view.zoom);
    o.y = Math.round(drag.oy + (my - drag.sy) / view.zoom);
    drag.moved = true; draw();
  } else if (drag.mode === 'colbox') {
    const v = colView, d = assetDef(colAsset);
    const x0 = Math.min(drag.x0, mx), y0 = Math.min(drag.y0, my);
    const x1 = Math.max(drag.x0, mx), y1 = Math.max(drag.y0, my);
    const c = d.col;
    c.offX = Math.max(0, Math.min(1, (x0 - v.ax) / (d.w * v.scale)));
    c.offY = Math.max(0, Math.min(1, (y0 - v.ay) / (d.h * v.scale)));
    c.w = Math.max(0.02, Math.min(1 - c.offX, (x1 - x0) / (d.w * v.scale)));
    c.h = Math.max(0.02, Math.min(1 - c.offY, (y1 - y0) / (d.h * v.scale)));
    inspect(); draw();
  }
});
window.addEventListener('mouseup', () => { drag = null; });
cv.addEventListener('wheel', e => {
  e.preventDefault();
  const [wx, wy] = s2w(e.offsetX, e.offsetY);
  view.zoom *= e.deltaY < 0 ? 1.1 : 1 / 1.1;
  view.zoom = Math.max(0.02, Math.min(2, view.zoom));
  // keep cursor anchored
  view.panX = wx - e.offsetX / view.zoom;
  view.panY = wy - e.offsetY / view.zoom;
  draw();
}, { passive: false });

// ---- tabs / export ----
document.getElementById('tabPlace').onclick = () => setMode('place');
document.getElementById('tabCol').onclick = () => setMode('col');
function setMode(m) {
  mode = m;
  document.getElementById('tabPlace').classList.toggle('on', m === 'place');
  document.getElementById('tabCol').classList.toggle('on', m === 'col');
  refreshThumbSel(); inspect(); draw();
}
document.getElementById('fit').onclick = fit;
function download(name, obj) {
  const json = JSON.stringify(obj, null, 2);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
  a.download = name; a.click(); URL.revokeObjectURL(a.href);
  navigator.clipboard && navigator.clipboard.writeText(json);
}
document.getElementById('exportObjs').onclick = () => { download('painted-isle-objects.json', { objects }); status('exported placements (also copied)'); };
document.getElementById('exportDefs').onclick = () => { download('saborosa-assets-001-sprites.json', defs); status('exported 001 defs (also copied)'); };
document.getElementById('exportDefs2').onclick = () => {
  // Strip the editor-only tags (sheet/defaultScale) so the file matches the
  // build-block-defs.py output; keep x/y/w/h/kind/col.
  const clean = { sheet: blockDefs.sheet, assets: {} };
  for (const [id, d] of Object.entries(blockDefs.assets)) {
    const { sheet, defaultScale, ...rest } = d; clean.assets[id] = rest;
  }
  download('saborosa-assets-002-sprites.json', clean); status('exported 002 defs (also copied)');
};

boot();
</script>
</body>
</html>
