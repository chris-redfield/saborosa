<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saborosa — Dungeon Perspective & Cat Collision</title>
<style>
  :root { --bg:#1a1a2e; --panel:#16213e; --accent:#53d8fb; --hot:#e94560; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:#e6e6e6;
              font:13px/1.4 monospace; overflow:hidden; }
  #top { display:flex; align-items:center; gap:10px; padding:8px 12px;
         background:var(--panel); border-bottom:1px solid #0c1226; }
  #top b { color:var(--accent); }
  button { padding:5px 10px; border:1px solid #3a4a6a; border-radius:4px;
           background:#22304f; color:#cfe; cursor:pointer; }
  button:hover { background:#2c3e63; }
  #tabs { display:flex; gap:6px; }
  .tab.active { background:var(--accent); color:#06263a; border-color:var(--accent); font-weight:bold; }
  #main { display:flex; height:calc(100% - 43px); }
  #stage { flex:1; position:relative; overflow:hidden; }
  canvas { display:block; position:absolute; inset:0; }
  #side { width:320px; background:var(--panel); border-left:1px solid #0c1226;
          display:flex; flex-direction:column; overflow-y:auto; }
  #side .group { padding:8px 12px; border-bottom:1px solid #0c1226; }
  #side h3 { margin:4px 0 8px; color:var(--accent); font-size:12px; letter-spacing:.5px; }
  label.s { display:block; margin:7px 0 1px; color:#9ab; font-size:11px;
            display:flex; justify-content:space-between; }
  label.s span { color:#cfe; }
  input[type=range] { width:100%; }
  label.cb { display:flex; align-items:center; gap:6px; margin:6px 0; color:#cfe; }
  .hint { color:#7a8aa8; font-size:11px; }
  #readout { white-space:pre; color:#8fce8f; font-size:11px; }
  #status { margin-left:auto; color:#8fce8f; }
  pre#out { background:#0e1730; border:1px solid #2a3a5a; border-radius:4px;
            padding:6px; font-size:10px; color:#cfe; white-space:pre-wrap; max-height:200px;
            overflow:auto; }
</style>
</head>
<body>
<div id="top">
  <b>DUNGEON TOOL</b>
  <span id="tabs">
    <button class="tab active" data-mode="perspective">Perspective</button>
    <button class="tab" data-mode="cat">Cat Collision</button>
  </span>
  <span class="hint">WASD / arrows — W&nbsp;=&nbsp;walk in · S&nbsp;=&nbsp;out · A/D&nbsp;=&nbsp;strafe</span>
  <span id="status"></span>
</div>
<div id="main">
  <div id="stage"><canvas id="cv"></canvas></div>
  <div id="side"></div>
</div>
<script>
// In-game dungeon assets (see src/engine/game.js + src/screens/dungeon.js).
// Referenced by BARE FILENAME and resolved at load time against several possible
// base paths (see loadAsset) so the tool works no matter where the server root is
// (repo root, /tools, etc.) or whether it's opened over file://.
const DUNGEON_FILE = 'saborosa-dungeon-fundo-novo.png';
const GATO_FILES = ['saborosa-dungeon-gato-01.png', 'saborosa-dungeon-gato-02.png', 'saborosa-dungeon-gato-03.png'];
const CHAR_FILE = 'saborosa-cha-001.png';
// Idle frames inlined from saborosa-cha-001-sprites.json (so the sprite renders
// under file:// too, where fetch() is CORS-blocked).
const CHAR_FRAMES = {
  down:{x:237,y:353,w:145,h:109}, up:{x:241,y:77,w:145,h:109},
  left:{x:55,y:219,w:145,h:109}, right:{x:422,y:215,w:145,h:109},
  down_right:{x:391,y:346,w:145,h:109}, down_left:{x:75,y:345,w:145,h:109},
  up_right:{x:398,y:94,w:145,h:109}, up_left:{x:75,y:106,w:145,h:109},
};

// The cat statue is a full-canvas overlay nudged left by this many screen px in
// dungeon.js (gatoOffsetX = -10) relative to a ~898px-wide displayed bg. Kept as
// a fraction of bg width so the nudge is faithful at any tool canvas size.
const GATO_OFFSET_FRAC = -10 / 898.6;

// ---- tunable parameters ---------------------------------------------------
// All positions are NORMALIZED (0..1) relative to the displayed background
// rect, so the tool is resolution-independent and the numbers transfer
// straight into the game once tuned.
const params = {
  vpX:   0.505, vpY:   0.545,
  yNear: 1.00,  yFar:  0.675,
  halfNear: 0.475, halfFar: 0.170,
  fracNear: 0.160, fracFar: 0.08,
  sizeScale: 0.5, moveSpeed: 0.35,
  perspLock: true, perspSpeed: true, showGuides: true,
};

// Cat-furnace collision as a UNION of axis-aligned boxes in (t: depth, L:
// lateral) space — the space the player moves in. A big body box plus two small
// paw boxes poking forward. Each box is { tMin, tMax, lMin, lMax } (tMin = front
// edge nearest the camera, tMax = back edge). The game reads this array as
// cfg.statueBoxes; see DungeonScreen in src/screens/dungeon.js.
let statueBoxes = [
  { name:'body',  tMin:0.85, tMax:1.00, lMin:-0.42, lMax:0.50 },
  { name:'paw L', tMin:0.80, tMax:0.90, lMin:-0.42, lMax:-0.14 },
  { name:'paw R', tMin:0.80, tMax:0.90, lMin: 0.22, lMax:0.50 },
];
let selBox = 0;          // index of the box whose vertices are draggable

// Mouth feed target — a rectangle on the BACK WALL in normalized bg coords (the
// cat is painted on the bg, so this sits on the wall, NOT on the floor plane).
// A thrown barrel feeds the furnace when its on-screen point enters this rect;
// the explosion pops at its centre. Exported as `mouthRect` (DungeonScreen reads
// cfg.mouthRect). Tuned with the x/y/w/h sliders in the Cat Collision tab.
let mouthRect = { x:0.44, y:0.40, w:0.12, h:0.12 };

const SLIDERS = [
  ['vpX','vanishing X',0,1,0.005],
  ['vpY','vanishing Y',0,1,0.005],
  ['yNear','floor near Y (front)',0.5,1,0.005],
  ['yFar','floor far Y (back)',0.3,0.95,0.005],
  ['halfNear','floor half-width near',0.05,0.5,0.005],
  ['halfFar','floor half-width far',0.01,0.45,0.005],
  ['fracNear','sprite size near',0.05,0.5,0.005],
  ['fracFar','sprite size far',0.01,0.3,0.005],
  ['sizeScale','player size (baseline)',0.2,3,0.01],
  ['moveSpeed','move speed',0.05,1.5,0.01],
];

// ---- state ----------------------------------------------------------------
let mode = 'perspective';  // 'perspective' | 'cat'
let t = 0.12, L = 0, facing = 'down';
const keys = Object.create(null);

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const stage = document.getElementById('stage');
let bgImg = null, gatoImgs = [], gatoFrame = 0, gatoTimer = 0;
let charImg = null, charFrames = null;
let bg = { x:0, y:0, w:0, h:0 };

const DUN_W = 1022, DUN_H = 819;   // native dungeon dimensions (fundo-novo)
const loadErrors = [];             // filenames that failed (shown on-canvas)

// Candidate base paths for the assets folder, tried in order. Covers: tool under
// /tools with server root = repo root ('../assets/'), server root = repo root
// accessed absolutely ('/assets/'), tool served alongside assets ('assets/'),
// and deeper nesting. The first base that yields a real image is remembered and
// reused for the rest, so we only probe once.
const ASSET_BASES = ['../assets/', '/assets/', 'assets/', '../../assets/', './assets/'];
let assetBase = null;
let triedURLs = [];                // every URL we attempted (for the error banner)

// ---- loading ---------------------------------------------------------------
// Load a single URL; resolves to the Image or null (never rejects/hangs).
function tryLoad(url){ return new Promise(r=>{ const i=new Image(); i.onload=()=>r(i);
  i.onerror=()=>r(null); i.src=url; }); }
// Resolve a bare filename against the candidate bases.
async function loadAsset(name){
  if (assetBase){ const im = await tryLoad(assetBase + name); if (im) return im; }
  for (const b of ASSET_BASES){
    const url = b + name; triedURLs.push(url);
    const im = await tryLoad(url);
    if (im){ assetBase = b; return im; }
  }
  console.warn('asset failed to load from every base:', name);
  loadErrors.push(name);
  return null;
}
async function boot(){
  // Wire the UI + start the render loop IMMEDIATELY, before any await, so the
  // tabs are clickable and the canvas paints even while (or if) assets are still
  // loading. draw() guards against not-yet-loaded images.
  setupTabs();
  buildPanel();
  resize();
  requestAnimationFrame(loop);
  status('loading assets…');

  bgImg = await loadAsset(DUNGEON_FILE);
  charImg = await loadAsset(CHAR_FILE);
  gatoImgs = (await Promise.all(GATO_FILES.map(loadAsset))).filter(Boolean);

  // Idle frame coords, inlined from saborosa-cha-001-sprites.json so the sprite
  // shows even under the file:// protocol (where fetch() is CORS-blocked). If the
  // sheet ever changes, re-copy these from the JSON.
  charFrames = CHAR_FRAMES;

  status(loadErrors.length ? ('⚠ ' + loadErrors.length + ' asset(s) failed — see canvas')
                           : ('ready · assets from "' + assetBase + '" · drive with WASD'));
}
function status(s){ document.getElementById('status').textContent = s; }

function setupTabs(){
  document.querySelectorAll('.tab').forEach(btn => {
    btn.onclick = () => {
      mode = btn.dataset.mode;
      document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn));
      buildPanel();
      status(mode === 'cat' ? 'cat collision — walk into the box to test it' : 'perspective');
    };
  });
}

// ---- layout ----------------------------------------------------------------
function resize(){
  cv.width = stage.clientWidth; cv.height = stage.clientHeight;
  const s = Math.min(cv.width / DUN_W, cv.height / DUN_H);
  bg.w = DUN_W * s; bg.h = DUN_H * s;
  bg.x = (cv.width - bg.w) / 2; bg.y = (cv.height - bg.h) / 2;
}
window.addEventListener('resize', resize);

// ---- perspective math ------------------------------------------------------
const lerp = (a,b,k)=> a + (b-a)*k;
function fracAt(tt){ return lerp(params.fracNear, effFracFar(), tt) * params.sizeScale; }
function effFracFar(){
  if (!params.perspLock) return params.fracFar;
  const span = (params.yNear - params.vpY);
  if (span <= 0) return params.fracFar;
  return params.fracNear * (params.yFar - params.vpY) / span;
}
function floorPoint(tt, LL){
  const yN = lerp(params.yNear, params.yFar, tt);
  const halfW = lerp(params.halfNear, params.halfFar, tt);
  const xN = params.vpX + LL * halfW;
  return { x: bg.x + xN * bg.w, y: bg.y + yN * bg.h, frac: fracAt(tt), halfW };
}
// Inverse of floorPoint: screen px → (t, L). Used to drag box vertices with the
// mouse. t is solved from the (linear) Y mapping, then L from the width at that t.
function screenToTL(mx, my){
  const yN = (my - bg.y) / bg.h;
  const denom = (params.yFar - params.yNear) || 1e-6;
  let tt = (yN - params.yNear) / denom;
  tt = Math.max(0, Math.min(1, tt));
  const halfW = lerp(params.halfNear, params.halfFar, tt) || 1e-6;
  const xN = (mx - bg.x) / bg.w;
  let LL = (xN - params.vpX) / halfW;
  LL = Math.max(-1, Math.min(1, LL));
  return { t: tt, L: LL };
}

// General multi-box collision in (t, L): reject the player from every box with
// per-axis resolution (resolve depth, then lateral) so faces block but corners
// stay passable — same feel as the old single box, now for the whole union.
const EPS = 0.02; // keep box edges from crossing when dragging
function resolveBoxes(oldT, oldL, nt, nl, boxes){
  let rt = nt, rl = oldL;
  for (const b of boxes){
    if (rl > b.lMin && rl < b.lMax){
      if (oldT <= b.tMin && rt > b.tMin) rt = b.tMin;       // blocked entering the front
      else if (oldT >= b.tMax && rt < b.tMax) rt = b.tMax;  // blocked entering the back
    }
  }
  rl = nl;
  for (const b of boxes){
    // tMax is INCLUSIVE here: a box whose back edge sits on the wall (tMax=1)
    // must still block lateral entry when the player is pinned at the wall,
    // otherwise they slide straight through the footprint behind it. tMin stays
    // EXCLUSIVE so sliding along the front face still works.
    if (rt > b.tMin && rt <= b.tMax){
      if (oldL <= b.lMin && rl > b.lMin) rl = b.lMin;       // blocked entering the left
      else if (oldL >= b.lMax && rl < b.lMax) rl = b.lMax;  // blocked entering the right
    }
  }
  return { t: rt, L: rl };
}

// ---- update ----------------------------------------------------------------
let last = 0;
function update(dt){
  if (gatoImgs.length) {
    gatoTimer += dt;
    if (gatoTimer >= 0.2) { gatoTimer -= 0.2; gatoFrame = (gatoFrame + 1) % gatoImgs.length; }
  }

  let dT = 0, dL = 0;
  if (keys['w'] || keys['arrowup'])    dT += 1;
  if (keys['s'] || keys['arrowdown'])  dT -= 1;
  if (keys['d'] || keys['arrowright']) dL += 1;
  if (keys['a'] || keys['arrowleft'])  dL -= 1;

  const persp = params.perspSpeed ? (fracAt(t) / fracAt(0)) : 1;
  const oldT = t, oldL = L;
  let nt = Math.max(0, Math.min(1, oldT + dT * params.moveSpeed * persp * dt));
  let nl = Math.max(-1, Math.min(1, oldL + dL * params.moveSpeed * dt));

  // Cat mode: apply the SAME multi-box collision the game uses, so the boxes can
  // be felt while tuning.
  if (mode === 'cat') {
    const r = resolveBoxes(oldT, oldL, nt, nl, statueBoxes);
    nt = r.t; nl = r.L;
  }
  t = nt; L = nl;

  const up = dT > 0, down = dT < 0, right = dL > 0, left = dL < 0;
  if (up && right) facing = 'up_right';
  else if (up && left) facing = 'up_left';
  else if (down && right) facing = 'down_right';
  else if (down && left) facing = 'down_left';
  else if (up) facing = 'up';
  else if (down) facing = 'down';
  else if (right) facing = 'right';
  else if (left) facing = 'left';
}

// ---- draw ------------------------------------------------------------------
function draw(){
  ctx.fillStyle = '#0c1020'; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.imageSmoothingEnabled = true;
  if (bgImg) ctx.drawImage(bgImg, bg.x, bg.y, bg.w, bg.h);

  // Cat statue overlay (full-canvas, aligned to bg with the same nudge as game).
  if (gatoImgs.length && gatoImgs[gatoFrame]) {
    ctx.drawImage(gatoImgs[gatoFrame], bg.x + GATO_OFFSET_FRAC * bg.w, bg.y, bg.w, bg.h);
  }

  if (params.showGuides && mode === 'perspective') drawGuides();
  if (mode === 'cat') { drawStatueBoxes(); drawMouthRect(); }

  // The character.
  const p = floorPoint(t, L);
  const fr = charFrames ? charFrames[facing] || charFrames.down : null;
  const spriteH = p.frac * bg.h;
  if (fr && charImg) {
    const aspect = fr.w / fr.h;
    const spriteW = spriteH * aspect;
    ctx.drawImage(charImg, fr.x, fr.y, fr.w, fr.h, p.x - spriteW/2, p.y - spriteH, spriteW, spriteH);
  } else {
    const w = spriteH * 0.5;
    ctx.fillStyle = '#e94560';
    ctx.fillRect(p.x - w/2, p.y - spriteH, w, spriteH);
  }

  // Foot marker.
  ctx.fillStyle = '#53d8fb';
  ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 7); ctx.fill();

  if (loadErrors.length) drawLoadError();
  updateReadout(p);
}

// Big visible banner if images couldn't load, with the actual URLs tried and
// guidance tailored to how the page was opened (file:// vs a mis-rooted server).
function drawLoadError(){
  const isFile = location.protocol === 'file:';
  const lines = isFile ? [
    '⚠ ' + loadErrors.length + ' image(s) failed to load.',
    'You opened this over file:// — the browser is blocking access to ../assets/.',
    'Fix: serve the repo over http from the REPO ROOT, then open:',
    '  http://localhost:8000/tools/dungeon-perspective.html',
    '  (repo root:  python3 -m http.server 8000 )',
  ] : [
    '⚠ ' + loadErrors.length + ' image(s) failed to load over ' + location.protocol,
    'The assets folder was not found from this page. Your server root must be',
    'the REPO ROOT, with this tool at /tools/dungeon-perspective.html so that',
    '/assets/... resolves. Current page: ' + location.pathname,
    'Tried: ' + triedURLs.slice(0, 5).join('  '),
  ];
  lines.push('');
  lines.push('Missing: ' + loadErrors.join(', '));
  const w = Math.min(cv.width - 40, 860), lh = 22, h = lines.length * lh + 24;
  const x = (cv.width - w) / 2, y = 20;
  ctx.fillStyle = 'rgba(20,8,12,0.92)'; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#e94560'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
  ctx.font = '13px monospace'; ctx.textBaseline = 'top';
  for (let i = 0; i < lines.length; i++){
    ctx.fillStyle = i === 0 ? '#ffd166' : '#f4cdd6';
    ctx.fillText(lines[i], x + 14, y + 14 + i * lh);
  }
  ctx.textBaseline = 'alphabetic';
}

function drawGuides(){
  const nl = floorPoint(0,-1), nr = floorPoint(0,1);
  const fl = floorPoint(1,-1), fr = floorPoint(1,1);
  ctx.strokeStyle = 'rgba(83,216,251,0.55)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(nl.x, nl.y); ctx.lineTo(nr.x, nr.y);
  ctx.lineTo(fr.x, fr.y); ctx.lineTo(fl.x, fl.y); ctx.closePath(); ctx.stroke();
  ctx.strokeStyle = 'rgba(83,216,251,0.22)';
  for (let i=1;i<=4;i++){ const tt=i/5; const a=floorPoint(tt,-1), b=floorPoint(tt,1);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
  const vx = bg.x + params.vpX*bg.w, vy = bg.y + params.vpY*bg.h;
  ctx.strokeStyle = '#e94560'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(vx-8,vy); ctx.lineTo(vx+8,vy);
  ctx.moveTo(vx,vy-8); ctx.lineTo(vx,vy+8); ctx.stroke();
}

// Draggable handles for a box: 4 corners (set two edges) + 4 edge midpoints (set
// one edge). Each carries the screen px + which edge key(s) it drives.
function boxHandles(b){
  const midT = (b.tMin + b.tMax) / 2, midL = (b.lMin + b.lMax) / 2;
  const P = (tt, LL) => { const p = floorPoint(tt, LL); return { x: p.x, y: p.y }; };
  return [
    // corners
    { ...P(b.tMin, b.lMin), keys:['tMin','lMin'], corner:true },
    { ...P(b.tMin, b.lMax), keys:['tMin','lMax'], corner:true },
    { ...P(b.tMax, b.lMax), keys:['tMax','lMax'], corner:true },
    { ...P(b.tMax, b.lMin), keys:['tMax','lMin'], corner:true },
    // edge midpoints
    { ...P(b.tMin, midL), keys:['tMin'], corner:false },
    { ...P(b.tMax, midL), keys:['tMax'], corner:false },
    { ...P(midT, b.lMin), keys:['lMin'], corner:false },
    { ...P(midT, b.lMax), keys:['lMax'], corner:false },
  ];
}

// The red collision boxes, each an axis-aligned (t,L) rect drawn as a perspective
// trapezoid. The selected box is bright with its front face highlighted + draggable
// vertex/edge handles; the others are dimmed (click to select).
function drawStatueBoxes(){
  statueBoxes.forEach((b, i) => {
    const sel = i === selBox;
    const fL = floorPoint(b.tMin, b.lMin), fR = floorPoint(b.tMin, b.lMax);
    const bR = floorPoint(b.tMax, b.lMax), bL = floorPoint(b.tMax, b.lMin);
    ctx.beginPath();
    ctx.moveTo(fL.x, fL.y); ctx.lineTo(fR.x, fR.y);
    ctx.lineTo(bR.x, bR.y); ctx.lineTo(bL.x, bL.y); ctx.closePath();
    ctx.fillStyle = sel ? 'rgba(233,69,96,0.24)' : 'rgba(233,69,96,0.10)';
    ctx.fill();
    ctx.strokeStyle = sel ? 'rgba(233,69,96,0.95)' : 'rgba(233,69,96,0.45)';
    ctx.lineWidth = sel ? 2 : 1.5; ctx.stroke();
    // Front stop-face highlighted (what actually blocks the player).
    ctx.strokeStyle = sel ? '#ffd166' : 'rgba(255,209,102,0.5)';
    ctx.lineWidth = sel ? 3 : 2;
    ctx.beginPath(); ctx.moveTo(fL.x, fL.y); ctx.lineTo(fR.x, fR.y); ctx.stroke();
    // Label near the box's front-center.
    const lc = floorPoint(b.tMin, (b.lMin + b.lMax) / 2);
    ctx.fillStyle = sel ? '#ffe6a0' : 'rgba(255,230,160,0.55)';
    ctx.font = '11px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(b.name || ('box ' + i), lc.x, lc.y - 6);
    ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
  });
  // Handles only for the selected box, drawn on top.
  const b = statueBoxes[selBox];
  if (b) {
    for (const h of boxHandles(b)) {
      ctx.beginPath(); ctx.arc(h.x, h.y, h.corner ? 6 : 5, 0, 7);
      ctx.fillStyle = h.corner ? '#ffd166' : '#53d8fb';
      ctx.fill(); ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 1.5; ctx.stroke();
    }
  }
}

// The mouth feed rect — a magenta screen rectangle on the back wall (over the
// cat), drawn straight in bg-normalized coords so it sits on the WALL, not the
// floor. A thrown barrel feeds the furnace when its on-screen point enters it.
function drawMouthRect(){
  const x = bg.x + mouthRect.x * bg.w, y = bg.y + mouthRect.y * bg.h;
  const w = mouthRect.w * bg.w, h = mouthRect.h * bg.h;
  ctx.fillStyle = 'rgba(233,72,233,0.18)'; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = 'rgba(233,72,233,0.95)'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = '#ff48e9';                         // centre dot = blast origin
  ctx.beginPath(); ctx.arc(x + w/2, y + h/2, 4, 0, 7); ctx.fill();
  ctx.fillStyle = '#ff9cf1'; ctx.font = '11px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('mouth ◈', x + w/2, y - 4);
  ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
  // Draggable corner/edge handles (magenta corners, blue edges).
  for (const hnd of mouthHandles()){
    ctx.beginPath(); ctx.arc(hnd.x, hnd.y, hnd.corner ? 6 : 5, 0, 7);
    ctx.fillStyle = hnd.corner ? '#ff48e9' : '#53d8fb';
    ctx.fill(); ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 1.5; ctx.stroke();
  }
}

// ---- side panel ------------------------------------------------------------
function buildPanel(){
  const side = document.getElementById('side');
  side.innerHTML = '';

  if (mode === 'perspective') {
    const g1 = group(side, 'Perspective');
    for (const [k,label,min,max,step] of SLIDERS) addSlider(g1, params, k, label, min, max, step);
    const g2 = group(side, 'Behavior');
    addCheckbox(g2, 'perspLock', 'lock far size to geometry (exact perspective)');
    addCheckbox(g2, 'perspSpeed', 'constant ground speed (slower when far)');
    addCheckbox(g2, 'showGuides', 'show floor guides');
  } else {
    const g1 = group(side, 'Cat Collision Boxes');
    const hint = document.createElement('div'); hint.className = 'hint';
    hint.style.marginBottom = '6px';
    hint.innerHTML = 'Drag the <b style="color:#ffd166">yellow corners</b> / <b style="color:#53d8fb">blue edges</b> on the canvas. ' +
      'Yellow = front stop-face. Click a box to select it. Walk in (WASD) to feel it.';
    g1.appendChild(hint);
    buildBoxList(g1);

    // Mouth feed rect — a screen rectangle on the back wall (over the cat mouth),
    // NOT a floor box. Tuned with x/y/w/h sliders; exported as mouthRect.
    const gm = group(side, 'Mouth Trigger (back wall)');
    const mh = document.createElement('div'); mh.className = 'hint'; mh.style.marginBottom = '6px';
    mh.innerHTML = '<b style="color:#e948e9">Magenta ◈</b> rect over the cat’s mouth (screen space, on the WALL). ' +
      'A thrown barrel feeds the furnace when it flies through here; the blast pops at the centre dot.';
    gm.appendChild(mh);
    addSlider(gm, mouthRect, 'x', 'x (left)',  0, 1, 0.005);
    addSlider(gm, mouthRect, 'y', 'y (top)',   0, 1, 0.005);
    addSlider(gm, mouthRect, 'w', 'width',  0.02, 0.6, 0.005);
    addSlider(gm, mouthRect, 'h', 'height', 0.02, 0.6, 0.005);
  }

  const g3 = group(side, 'Readout');
  const ro = document.createElement('div'); ro.id = 'readout'; g3.appendChild(ro);

  const g4 = group(side, 'Export');
  const row = document.createElement('div');
  const copy = document.createElement('button');
  copy.textContent = mode === 'cat' ? 'Copy boxes JSON' : 'Copy params JSON';
  const reset = document.createElement('button'); reset.textContent = 'Reset pos';
  reset.style.marginLeft = '6px';
  row.appendChild(copy); row.appendChild(reset); g4.appendChild(row);
  const out = document.createElement('pre'); out.id = 'out'; out.style.marginTop = '6px';
  g4.appendChild(out);
  copy.onclick = () => {
    const json = mode === 'cat' ? statueJSON() : paramJSON();
    out.textContent = json;
    navigator.clipboard && navigator.clipboard.writeText(json);
    status(mode === 'cat' ? 'boxes JSON copied' : 'params copied');
  };
  reset.onclick = () => { t = 0.12; L = 0; status('reset to near-center'); };
}
function group(host, title){
  const d = document.createElement('div'); d.className='group';
  const h = document.createElement('h3'); h.textContent = title; d.appendChild(h);
  host.appendChild(d); return d;
}
// Selectable list of collision boxes, with add/duplicate/delete + rename.
function buildBoxList(host){
  const list = document.createElement('div');
  statueBoxes.forEach((b, i) => {
    const rowSel = i === selBox;
    const row = document.createElement('div');
    row.style.display = 'flex'; row.style.alignItems = 'center'; row.style.gap = '4px';
    row.style.margin = '3px 0'; row.style.padding = '3px 5px'; row.style.borderRadius = '4px';
    row.style.cursor = 'pointer';
    row.style.background = rowSel ? '#2c3e63' : '#0e1730';
    row.style.border = '1px solid ' + (rowSel ? '#53d8fb' : '#2a3a5a');
    const name = document.createElement('input');
    name.value = b.name || ('box ' + i); name.style.flex = '1';
    name.style.background = 'transparent'; name.style.border = 'none'; name.style.color = '#cfe';
    name.style.font = '12px monospace';
    name.onclick = e => { e.stopPropagation(); selBox = i; buildPanel(); };
    name.onchange = e => { b.name = e.target.value; };
    const del = document.createElement('button'); del.textContent = '✕';
    del.title = 'delete'; del.style.padding = '2px 6px';
    del.onclick = e => {
      e.stopPropagation();
      if (statueBoxes.length <= 1) { status('keep at least one box'); return; }
      statueBoxes.splice(i, 1);
      selBox = Math.max(0, Math.min(selBox, statueBoxes.length - 1));
      buildPanel();
    };
    row.onclick = () => { selBox = i; buildPanel(); };
    row.appendChild(name); row.appendChild(del);
    list.appendChild(row);
  });
  host.appendChild(list);

  const btns = document.createElement('div'); btns.style.marginTop = '6px';
  const add = document.createElement('button'); add.textContent = '+ box';
  add.onclick = () => {
    statueBoxes.push({ name:'box ' + statueBoxes.length, tMin:0.80, tMax:0.92, lMin:-0.15, lMax:0.15 });
    selBox = statueBoxes.length - 1; buildPanel();
  };
  const dup = document.createElement('button'); dup.textContent = 'duplicate';
  dup.style.marginLeft = '6px';
  dup.onclick = () => {
    const b = statueBoxes[selBox]; if (!b) return;
    statueBoxes.push({ ...b, name: (b.name || 'box') + ' copy' });
    selBox = statueBoxes.length - 1; buildPanel();
  };
  btns.appendChild(add); btns.appendChild(dup);
  host.appendChild(btns);

  // Numeric edges of the selected box (fine nudging alongside the mouse drag).
  const b = statueBoxes[selBox];
  if (b) {
    const nums = document.createElement('div'); nums.style.marginTop = '8px';
    [['tMin','front (t)',0,1],['tMax','back (t)',0,1],
     ['lMin','left (L)',-1,1],['lMax','right (L)',-1,1]].forEach(([k,label,mn,mx]) => {
      const l = document.createElement('label'); l.className='s';
      const nm = document.createElement('span'); nm.textContent = label;
      const val = document.createElement('span'); val.textContent = (+b[k]).toFixed(3);
      l.appendChild(nm); l.appendChild(val);
      const inp = document.createElement('input'); inp.type='range';
      inp.min=mn; inp.max=mx; inp.step=0.005; inp.value=b[k];
      inp.oninput = e => { setBoxEdge(b, k, parseFloat(e.target.value)); val.textContent = b[k].toFixed(3); };
      nums.appendChild(l); nums.appendChild(inp);
    });
    host.appendChild(nums);
  }
}
// Set one edge of a box, clamped so edges never cross (keeps a min size).
function setBoxEdge(b, key, v){
  if (key === 'tMin') b.tMin = Math.max(0, Math.min(v, b.tMax - EPS));
  else if (key === 'tMax') b.tMax = Math.min(1, Math.max(v, b.tMin + EPS));
  else if (key === 'lMin') b.lMin = Math.max(-1, Math.min(v, b.lMax - EPS));
  else if (key === 'lMax') b.lMax = Math.min(1, Math.max(v, b.lMin + EPS));
}
function addSlider(host, obj, key, label, min, max, step){
  const l = document.createElement('label'); l.className='s';
  const name = document.createElement('span'); name.textContent = label;
  const val = document.createElement('span'); val.textContent = (+obj[key]).toFixed(3);
  l.appendChild(name); l.appendChild(val);
  const inp = document.createElement('input'); inp.type='range';
  inp.min=min; inp.max=max; inp.step=step; inp.value=obj[key];
  inp.oninput = e => { obj[key] = parseFloat(e.target.value); val.textContent = obj[key].toFixed(3); };
  host.appendChild(l); host.appendChild(inp);
}
function addCheckbox(host, key, label){
  const l = document.createElement('label'); l.className='cb';
  const c = document.createElement('input'); c.type='checkbox'; c.checked = !!params[key];
  c.onchange = e => { params[key] = e.target.checked; };
  l.appendChild(c); l.appendChild(document.createTextNode(label));
  host.appendChild(l);
}
function updateReadout(p){
  const ro = document.getElementById('readout'); if (!ro) return;
  if (mode === 'cat') {
    const b = statueBoxes[selBox];
    let s = `player t ${t.toFixed(3)}  L ${L.toFixed(3)}\n` +
            `facing   ${facing}\n` +
            `boxes    ${statueBoxes.length}   selected: ${b ? (b.name || selBox) : '-'}\n`;
    if (b) s += `  t [${b.tMin.toFixed(3)}, ${b.tMax.toFixed(3)}]\n` +
                `  L [${b.lMin.toFixed(3)}, ${b.lMax.toFixed(3)}]`;
    ro.textContent = s;
  } else {
    ro.textContent =
      `depth t   ${t.toFixed(3)}  (0 near · 1 far)\n` +
      `lateral L ${L.toFixed(3)}\n` +
      `facing    ${facing}\n` +
      `size frac ${p.frac.toFixed(3)}  (× bg height)\n` +
      `foot px   ${p.x.toFixed(0)}, ${p.y.toFixed(0)}\n` +
      `fracFar   slider ${params.fracFar.toFixed(3)} → used ${effFracFar().toFixed(3)}\n` +
      `          ${params.perspLock ? 'LOCKED: slider IGNORED (far size from geometry)' : 'unlocked: slider is used'}`;
  }
}
// Export the perspective as a paste-ready `perspective: { ... }` block for the
// stage's dungeon config in src/world/stages.js (DungeonScreen merges it over its
// defaults via cfg.perspective). We export the RAW fracFar slider (NOT the
// geometry-resolved value) together with perspLock, so the pair round-trips: with
// perspLock:false the game uses this fracFar directly; with perspLock:true it
// recomputes far size from geometry (and ignores fracFar) exactly like the tool.
function paramJSON(){
  const persp = {};
  for (const [k] of SLIDERS) persp[k] = +params[k].toFixed(4); // vpX..moveSpeed, incl. raw fracFar
  persp.perspLock = params.perspLock;
  persp.perspSpeed = params.perspSpeed;
  return JSON.stringify({ perspective: persp }, null, 2);
}
// Paste this into the stage's `dungeon` config in src/world/stages.js (as
// `statueBoxes: [ ... ]`), which DungeonScreen reads via cfg.statueBoxes.
function statueJSON(){
  const r3 = v => +v.toFixed(3);
  // Solid furnace boxes → statueBoxes; the back-wall mouth rect → mouthRect. Both
  // go into the stage's `dungeon` config (DungeonScreen reads cfg.statueBoxes +
  // cfg.mouthRect).
  return JSON.stringify({
    statueBoxes: statueBoxes.map(b => ({
      name: b.name, tMin: r3(b.tMin), tMax: r3(b.tMax), lMin: r3(b.lMin), lMax: r3(b.lMax)
    })),
    mouthRect: { x: r3(mouthRect.x), y: r3(mouthRect.y), w: r3(mouthRect.w), h: r3(mouthRect.h) }
  }, null, 2);
}

// ---- input + loop ----------------------------------------------------------
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) e.preventDefault();
  keys[k] = true;
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// ---- mouse: drag box vertices / edges / whole box --------------------------
let drag = null; // { keys:[...] } for a handle, or { whole:true, t0, L0, box:{...} }
function canvasXY(e){ const r = cv.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
function pointInBoxTL(pt, b){ return pt.t > b.tMin && pt.t < b.tMax && pt.L > b.lMin && pt.L < b.lMax; }

// --- mouth rect (screen space) drag helpers --------------------------------
const MOUTH_MIN = 0.02; // min normalized size when resizing
function mouseToBg(m){ return { x:(m.x - bg.x) / bg.w, y:(m.y - bg.y) / bg.h }; }
function mouthCorners(){ // screen px extents
  const x0 = bg.x + mouthRect.x * bg.w, y0 = bg.y + mouthRect.y * bg.h;
  return { x0, y0, x1: x0 + mouthRect.w * bg.w, y1: y0 + mouthRect.h * bg.h };
}
function pointInMouth(m){ const c = mouthCorners(); return m.x > c.x0 && m.x < c.x1 && m.y > c.y0 && m.y < c.y1; }
// 4 corners + 4 edge midpoints, each tagged with the edges it moves (l/r/t/b).
function mouthHandles(){
  const c = mouthCorners(), mx = (c.x0 + c.x1) / 2, my = (c.y0 + c.y1) / 2;
  return [
    { x:c.x0, y:c.y0, keys:['l','t'], corner:true }, { x:c.x1, y:c.y0, keys:['r','t'], corner:true },
    { x:c.x1, y:c.y1, keys:['r','b'], corner:true }, { x:c.x0, y:c.y1, keys:['l','b'], corner:true },
    { x:mx, y:c.y0, keys:['t'] }, { x:mx, y:c.y1, keys:['b'] },
    { x:c.x0, y:my, keys:['l'] }, { x:c.x1, y:my, keys:['r'] },
  ];
}
// Move the named edges to the bg-normalized point p, keeping the opposite edge
// fixed and a minimum size.
function setMouthEdge(keys, p){
  let left = mouthRect.x, right = mouthRect.x + mouthRect.w;
  let top = mouthRect.y, bottom = mouthRect.y + mouthRect.h;
  for (const k of keys){
    if (k === 'l') left = Math.max(0, Math.min(p.x, right - MOUTH_MIN));
    else if (k === 'r') right = Math.min(1, Math.max(p.x, left + MOUTH_MIN));
    else if (k === 't') top = Math.max(0, Math.min(p.y, bottom - MOUTH_MIN));
    else if (k === 'b') bottom = Math.min(1, Math.max(p.y, top + MOUTH_MIN));
  }
  mouthRect.x = left; mouthRect.w = right - left;
  mouthRect.y = top; mouthRect.h = bottom - top;
}

cv.addEventListener('mousedown', e => {
  if (mode !== 'cat') return;
  const m = canvasXY(e);
  // 1) A handle on the selected box?
  const b = statueBoxes[selBox];
  if (b) {
    for (const h of boxHandles(b)) {
      if (Math.hypot(h.x - m.x, h.y - m.y) <= 9) { drag = { keys: h.keys }; return; }
    }
  }
  // 1b) A handle on the mouth rect, or a click inside it → move the whole rect.
  for (const h of mouthHandles()) {
    if (Math.hypot(h.x - m.x, h.y - m.y) <= 9) { drag = { mouth: true, keys: h.keys }; return; }
  }
  if (pointInMouth(m)) {
    const p = mouseToBg(m);
    drag = { mouth: true, whole: true, x0: p.x, y0: p.y, rect: { ...mouthRect } };
    return;
  }
  // 2) Otherwise select whichever box is under the cursor (topmost last-drawn),
  //    and start a whole-box drag from there.
  const tl = screenToTL(m.x, m.y);
  for (let i = statueBoxes.length - 1; i >= 0; i--) {
    if (pointInBoxTL(tl, statueBoxes[i])) {
      selBox = i; buildPanel();
      drag = { whole: true, t0: tl.t, L0: tl.L, box: { ...statueBoxes[i] } };
      return;
    }
  }
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  const m = canvasXY(e);
  if (drag.mouth) {
    const p = mouseToBg(m);
    if (drag.whole) {
      const w = drag.rect.w, h = drag.rect.h;
      mouthRect.x = Math.max(0, Math.min(drag.rect.x + (p.x - drag.x0), 1 - w));
      mouthRect.y = Math.max(0, Math.min(drag.rect.y + (p.y - drag.y0), 1 - h));
    } else {
      setMouthEdge(drag.keys, p);
    }
    return;
  }
  const tl = screenToTL(m.x, m.y);
  const b = statueBoxes[selBox]; if (!b) return;
  if (drag.whole) {
    // Translate all edges by the drag delta, clamped to stay in range + keep size.
    const w = drag.box.tMax - drag.box.tMin, hgt = drag.box.lMax - drag.box.lMin;
    let ntMin = drag.box.tMin + (tl.t - drag.t0);
    let nlMin = drag.box.lMin + (tl.L - drag.L0);
    ntMin = Math.max(0, Math.min(ntMin, 1 - w));
    nlMin = Math.max(-1, Math.min(nlMin, 1 - hgt));
    b.tMin = ntMin; b.tMax = ntMin + w; b.lMin = nlMin; b.lMax = nlMin + hgt;
  } else {
    for (const k of drag.keys) setBoxEdge(b, k, k[0] === 't' ? tl.t : tl.L);
  }
});
window.addEventListener('mouseup', () => { if (drag) { drag = null; if (mode === 'cat') buildPanel(); } });
cv.addEventListener('mousemove', e => {
  if (mode !== 'cat' || drag) { cv.style.cursor = 'default'; return; }
  const m = canvasXY(e); const b = statueBoxes[selBox];
  let over = false;
  if (b) for (const h of boxHandles(b)) if (Math.hypot(h.x - m.x, h.y - m.y) <= 9) { over = true; break; }
  if (!over) for (const h of mouthHandles()) if (Math.hypot(h.x - m.x, h.y - m.y) <= 9) { over = true; break; }
  if (!over && pointInMouth(m)) over = true;
  cv.style.cursor = over ? 'grab' : 'default';
});

function loop(now){
  const dt = last ? Math.min(0.05, (now - last) / 1000) : 0;
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

boot();
</script>
</body>
</html>
